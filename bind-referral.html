<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推广关系管理</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            padding: 30px 0;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header p {
            color: #8892b0;
            font-size: 14px;
        }
        
        .wallet-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        
        .wallet-btn {
            padding: 16px 48px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .wallet-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .wallet-info {
            display: none;
        }
        
        .wallet-address {
            font-family: monospace;
            font-size: 16px;
            color: #64ffda;
            word-break: break-all;
            padding: 12px;
            background: rgba(100, 255, 218, 0.1);
            border-radius: 8px;
            margin-top: 12px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #64ffda;
            margin-bottom: 8px;
        }
        
        .stat-label {
            font-size: 12px;
            color: #8892b0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .relations-section {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 24px;
        }
        
        @media (max-width: 768px) {
            .relations-section {
                grid-template-columns: 1fr;
            }
        }
        
        .parent-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .bind-section {
            margin-top: 16px;
        }
        
        .bind-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 12px;
        }
        
        .bind-input::placeholder {
            color: #8892b0;
        }
        
        .bind-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #00d9ff 0%, #00b8d9 100%);
            border: none;
            border-radius: 10px;
            color: #000;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .bind-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 217, 255, 0.3);
        }
        
        .bind-btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .ref-from-url {
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 12px;
            font-size: 12px;
            color: #00d9ff;
            word-break: break-all;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .parent-info {
            background: rgba(100, 255, 218, 0.1);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid rgba(100, 255, 218, 0.3);
        }
        
        .parent-info.empty {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed rgba(255, 255, 255, 0.2);
            text-align: center;
            color: #8892b0;
        }
        
        .parent-address {
            font-family: monospace;
            font-size: 14px;
            color: #64ffda;
            word-break: break-all;
            margin-bottom: 8px;
        }
        
        .parent-balance {
            font-size: 12px;
            color: #8892b0;
        }
        
        .children-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .children-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .children-count {
            background: #64ffda;
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .children-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .child-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }
        
        .child-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .child-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .child-address {
            font-family: monospace;
            font-size: 14px;
            color: #fff;
        }
        
        .child-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .status-qualified {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }
        
        .status-pending {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }
        
        .status-not-qualified {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }
        
        .child-details {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            font-size: 12px;
        }
        
        .detail-item {
            text-align: center;
        }
        
        .detail-label {
            color: #8892b0;
            margin-bottom: 4px;
        }
        
        .detail-value {
            color: #fff;
            font-weight: 600;
        }
        
        .detail-value.qualified {
            color: #4caf50;
        }
        
        .detail-value.not-qualified {
            color: #f44336;
        }
        
        .claim-btn-small {
            padding: 6px 16px;
            background: linear-gradient(90deg, #ff6b6b 0%, #ffa500 100%);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .claim-btn-small:hover {
            transform: scale(1.05);
        }
        
        .claim-btn-small:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }
        
        .referral-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .referral-box {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        
        .referral-input {
            flex: 1;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #64ffda;
            font-family: monospace;
            font-size: 14px;
        }
        
        .copy-btn {
            padding: 14px 28px;
            background: #00d9ff;
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .copy-btn:hover {
            background: #00b8d9;
        }
        
        .up-qualify-card {
            background: linear-gradient(135deg, rgba(100, 255, 218, 0.1) 0%, rgba(0, 217, 255, 0.1) 100%);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(100, 255, 218, 0.3);
        }
        
        .qualify-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .qualify-item:last-child {
            border-bottom: none;
        }
        
        .qualify-label {
            color: #ccd6f6;
        }
        
        .qualify-status {
            font-weight: 600;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #8892b0;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            animation: slideDown 0.3s ease;
            max-width: 90%;
            text-align: center;
        }
        
        .message.success {
            background: rgba(76, 175, 80, 0.9);
            color: #fff;
        }
        
        .message.error {
            background: rgba(244, 67, 54, 0.9);
            color: #fff;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none !important;
        }
        
        .children-list::-webkit-scrollbar {
            width: 6px;
        }
        
        .children-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
        }
        
        .children-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }
        
        .phase-badge {
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👥 推广关系管理</h1>
            <p>查看您的上下级关系，管理推广团队</p>
        </div>
        
        <!-- 连接钱包 -->
        <div class="wallet-section" id="walletSection">
            <button id="connectBtn" class="wallet-btn" onclick="connectWallet()">
                🔗 连接钱包
            </button>
            <div class="wallet-info" id="walletInfo">
                <p style="color: #64ffda; margin-bottom: 8px;">✅ 已连接</p>
                <div id="walletAddress" class="wallet-address"></div>
            </div>
        </div>
        
        <!-- 统计 -->
        <div id="statsSection" class="hidden">
            <div class="stats-grid">
                <div class="stat-card">
                    <div id="totalChildren" class="stat-value">0</div>
                    <div class="stat-label">直接下级</div>
                </div>
                <div class="stat-card">
                    <div id="qualifiedChildren" class="stat-value">0</div>
                    <div class="stat-label">已达标</div>
                </div>
                <div class="stat-card">
                    <div id="pendingChildren" class="stat-value">0</div>
                    <div class="stat-label">持仓中</div>
                </div>
                <div class="stat-card">
                    <div id="currentPhase" class="stat-value">-</div>
                    <div class="stat-label">当前阶段</div>
                </div>
            </div>
        </div>
        
        <!-- 上级资格状态 -->
        <div id="upQualifyCard" class="up-qualify-card hidden">
            <div class="section-title">📋 我的领取资格（上级条件）</div>
            <div id="qualifyList">
                <!-- 动态填充 -->
            </div>
        </div>
        
        <!-- 上下级关系 -->
        <div id="relationsSection" class="relations-section hidden">
            <!-- 我的上级 -->
            <div class="parent-card">
                <div class="section-title">👆 我的上级</div>
                <div id="parentInfo" class="parent-info empty">
                    <p>暂无上级</p>
                </div>
                <div id="bindSection" class="bind-section hidden">
                    <div id="refFromUrl" class="ref-from-url hidden"></div>
                    <input type="text" id="bindAddressInput" class="bind-input" placeholder="输入上级钱包地址 (0x...)">
                    <button id="bindBtn" class="bind-btn" onclick="bindReferrer()">
                        🔗 绑定上级
                    </button>
                </div>
            </div>
            
            <!-- 我的下级 -->
            <div class="children-card">
                <div class="children-header">
                    <div class="section-title">👇 我的下级</div>
                    <span id="childrenCount" class="children-count">0人</span>
                </div>
                <div id="childrenList" class="children-list">
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>暂无下级</p>
                        <p style="font-size: 12px; margin-top: 8px;">分享您的推广链接邀请好友</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 推广链接 -->
        <div id="referralSection" class="referral-section hidden">
            <div class="section-title">📢 我的推广链接</div>
            <div class="referral-box">
                <input type="text" id="referralLink" class="referral-input" readonly>
                <button class="copy-btn" onclick="copyReferralLink()">复制链接</button>
            </div>
            <p style="margin-top: 12px; font-size: 12px; color: #8892b0;">
                💡 提示：下级必须先绑定此链接，再买入代币才能建立推广关系
            </p>
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        const CONFIG = {
            TOKEN_ADDRESS: "0xa61c5419d661b1396c95c91b41c89eeff5f79c68",
            BSC_RPC: "https://bsc-dataseed.binance.org/",
            DECIMALS: 18,
            HOLD_LOCK_PERIOD: 24 * 60 * 60
        };
        
        let web3;
        let account;
        let contract;
        
        // ==================== ABI ====================
        const TOKEN_ABI = [
            {
                "inputs": [{"internalType": "address", "name": "", "type": "address"}],
                "name": "referrer",
                "outputs": [{"internalType": "address", "name": "", "type": "address"}],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [{"internalType": "address", "name": "", "type": "address"}],
                "name": "referrerBindTime",
                "outputs": [{"internalType": "uint256", "name": "", "type": "uint256"}],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [{"internalType": "address", "name": "", "type": "address"}],
                "name": "userFirstBuyTime",
                "outputs": [{"internalType": "uint256", "name": "", "type": "uint256"}],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [{"internalType": "address", "name": "", "type": "address"}],
                "name": "userBuyPhase",
                "outputs": [{"internalType": "uint8", "name": "", "type": "uint8"}],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [{"internalType": "address", "name": "", "type": "address"}],
                "name": "balanceOf",
                "outputs": [{"internalType": "uint256", "name": "", "type": "uint256"}],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [{"internalType": "address", "name": "user", "type": "address"}],
                "name": "checkHoldQualified",
                "outputs": [
                    {"internalType": "bool", "name": "", "type": "bool"},
                    {"internalType": "uint256", "name": "", "type": "uint256"},
                    {"internalType": "uint256", "name": "", "type": "uint256"}
                ],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "getRewardPhase",
                "outputs": [{"internalType": "uint8", "name": "", "type": "uint8"}],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [{"internalType": "address", "name": "", "type": "address"}, {"internalType": "address", "name": "", "type": "address"}, {"internalType": "uint8", "name": "", "type": "uint8"}],
                "name": "rewardClaimed",
                "outputs": [{"internalType": "bool", "name": "", "type": "bool"}],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [{"internalType": "address", "name": "_referrer", "type": "address"}],
                "name": "bindReferrer",
                "outputs": [],
                "stateMutability": "nonpayable",
                "type": "function"
            },
            {
                "inputs": [{"internalType": "address", "name": "user", "type": "address"}],
                "name": "claimReward",
                "outputs": [],
                "stateMutability": "nonpayable",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "getCurrentPhase",
                "outputs": [{"internalType": "uint8", "name": "", "type": "uint8"}],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "isRewardActive",
                "outputs": [{"internalType": "bool", "name": "", "type": "bool"}],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "PHASE1_USER_THRESHOLD",
                "outputs": [{"internalType": "uint256", "name": "", "type": "uint256"}],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "PHASE2_USER_THRESHOLD",
                "outputs": [{"internalType": "uint256", "name": "", "type": "uint256"}],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "PHASE3_USER_THRESHOLD",
                "outputs": [{"internalType": "uint256", "name": "", "type": "uint256"}],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "anonymous": false,
                "inputs": [
                    {"indexed": true, "name": "user", "type": "address"},
                    {"indexed": true, "name": "referrer", "type": "address"}
                ],
                "name": "ReferralBound",
                "type": "event"
            }
        ];
        
        // ==================== 工具函数 ====================
        function formatAddress(address) {
            return address.slice(0, 6) + '...' + address.slice(-4);
        }
        
        function formatTokenAmount(amount) {
            const divisor = Math.pow(10, CONFIG.DECIMALS);
            const value = parseFloat(amount) / divisor;
            if (value >= 1000000) {
                return (value / 1000000).toFixed(2) + 'M';
            } else if (value >= 1000) {
                return (value / 1000).toFixed(2) + 'K';
            }
            return value.toFixed(2);
        }
        
        function formatTime(timestamp) {
            if (!timestamp || timestamp == 0) return '-';
            const date = new Date(timestamp * 1000);
            return date.toLocaleDateString('zh-CN') + ' ' + date.toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
        }
        
        function formatTimeLeft(seconds) {
            if (seconds <= 0) return '已达标';
            const hours = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            return `${hours}小时${mins}分`;
        }
        
        function showMessage(text, type = 'success') {
            const oldMsg = document.querySelector('.message');
            if (oldMsg) oldMsg.remove();
            
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            document.body.appendChild(msg);
            
            setTimeout(() => msg.remove(), 4000);
        }
        
        // ==================== 连接钱包 ====================
        async function connectWallet() {
            const btn = document.getElementById('connectBtn');
            
            try {
                if (typeof window.ethereum === 'undefined') {
                    showMessage('请安装 MetaMask 或 TokenPocket 钱包', 'error');
                    return;
                }
                
                btn.innerHTML = '<span class="loading"></span>连接中...';
                
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                account = accounts[0];
                web3 = new Web3(window.ethereum);
                contract = new web3.eth.Contract(TOKEN_ABI, CONFIG.TOKEN_ADDRESS);
                
                document.getElementById('connectBtn').classList.add('hidden');
                document.getElementById('walletInfo').style.display = 'block';
                document.getElementById('walletAddress').textContent = account;
                
                document.getElementById('statsSection').classList.remove('hidden');
                document.getElementById('relationsSection').classList.remove('hidden');
                document.getElementById('referralSection').classList.remove('hidden');
                document.getElementById('upQualifyCard').classList.remove('hidden');
                
                // 生成推广链接
                const baseUrl = window.location.origin + window.location.pathname;
                document.getElementById('referralLink').value = `${baseUrl}?ref=${account}`;
                
                // 加载数据
                await loadAllData();
                
                showMessage('钱包连接成功！');
                
            } catch (error) {
                console.error('连接失败:', error);
                showMessage('连接失败: ' + error.message, 'error');
                btn.innerHTML = '🔗 连接钱包';
            }
        }
        
        // ==================== 加载所有数据 ====================
        async function loadAllData() {
            await Promise.all([
                loadParent(),
                loadChildren(),
                loadUpQualifyStatus(),
                loadCurrentPhase()
            ]);
        }
        
        // 加载当前阶段
        async function loadCurrentPhase() {
            try {
                const phase = await contract.methods.getCurrentPhase().call();
                const isActive = await contract.methods.isRewardActive().call();
                
                let phaseText = '奖励已停止';
                if (isActive) {
                    phaseText = `第 ${phase} 阶段`;
                }
                
                document.getElementById('currentPhase').innerHTML = `<span class="phase-badge">${phaseText}</span>`;
                
            } catch (error) {
                console.error('加载阶段失败:', error);
            }
        }
        
        // 加载上级
        async function loadParent() {
            try {
                const parent = await contract.methods.referrer(account).call();
                const parentInfo = document.getElementById('parentInfo');
                const bindSection = document.getElementById('bindSection');
                
                if (parent && parent !== '0x0000000000000000000000000000000000000000') {
                    parentInfo.classList.remove('empty');
                    const balance = await contract.methods.balanceOf(parent).call();
                    parentInfo.innerHTML = `
                        <div class="parent-address">${parent}</div>
                        <div class="parent-balance">持仓: ${formatTokenAmount(balance)} 代币</div>
                    `;
                    bindSection.classList.add('hidden');
                } else {
                    parentInfo.classList.add('empty');
                    parentInfo.innerHTML = '<p>暂无上级</p>';
                    bindSection.classList.remove('hidden');
                    checkUrlReferrer();
                }
            } catch (error) {
                console.error('加载上级失败:', error);
            }
        }
        
        function checkUrlReferrer() {
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref');
            
            if (ref && ref.startsWith('0x') && ref.length === 42) {
                const refFromUrl = document.getElementById('refFromUrl');
                const bindInput = document.getElementById('bindAddressInput');
                
                refFromUrl.textContent = `🔗 来自链接: ${ref}`;
                refFromUrl.classList.remove('hidden');
                bindInput.value = ref;
            }
        }
        
        // 绑定上级
        async function bindReferrer() {
            const btn = document.getElementById('bindBtn');
            const input = document.getElementById('bindAddressInput');
            const referrerAddress = input.value.trim();
            
            if (!referrerAddress || !referrerAddress.startsWith('0x') || referrerAddress.length !== 42) {
                showMessage('请输入有效的钱包地址', 'error');
                return;
            }
            
            if (referrerAddress.toLowerCase() === account.toLowerCase()) {
                showMessage('不能绑定自己为上级', 'error');
                return;
            }
            
            try {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading"></span>绑定中...';
                
                await contract.methods.bindReferrer(referrerAddress).send({
                    from: account,
                    gas: 100000
                });
                
                showMessage('🎉 绑定上级成功！');
                await loadParent();
                
            } catch (error) {
                console.error('绑定失败:', error);
                if (error.message.includes('already bound')) {
                    showMessage('您已经绑定了上级', 'error');
                } else if (error.message.includes('User rejected')) {
                    showMessage('您取消了交易', 'error');
                } else {
                    showMessage('绑定失败', 'error');
                }
            }
            
            btn.innerHTML = '🔗 绑定上级';
            btn.disabled = false;
        }
        
        // ==================== 加载下级列表（通过事件） ====================
        async function loadChildren() {
            try {
                const events = await contract.getPastEvents('ReferralBound', {
                    filter: { referrer: account },
                    fromBlock: 0,
                    toBlock: 'latest'
                });
                
                const children = events.map(e => e.returnValues.user);
                const count = children.length;
                
                document.getElementById('totalChildren').textContent = count;
                document.getElementById('childrenCount').textContent = count + '人';
                
                if (count === 0) {
                    document.getElementById('childrenList').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>暂无下级</p>
                            <p style="font-size: 12px; margin-top: 8px;">分享您的推广链接邀请好友</p>
                        </div>
                    `;
                    document.getElementById('qualifiedChildren').textContent = '0';
                    document.getElementById('pendingChildren').textContent = '0';
                    return;
                }
                
                const currentPhase = await contract.methods.getRewardPhase().call();
                
                let qualifiedCount = 0;
                let pendingCount = 0;
                let childrenHtml = '';
                
                for (let i = 0; i < children.length; i++) {
                    const child = children[i];
                    const [qualified, threshold, endTime] = await contract.methods.checkHoldQualified(child).call();
                    const balance = await contract.methods.balanceOf(child).call();
                    const isClaimed = await contract.methods.rewardClaimed(account, child, currentPhase).call();
                    
                    let statusClass = 'status-not-qualified';
                    let statusText = '未达标';
                    let canClaim = false;
                    
                    if (qualified && !isClaimed) {
                        statusClass = 'status-qualified';
                        statusText = '已达标';
                        qualifiedCount++;
                        canClaim = true;
                    } else if (threshold > 0 && balance > 0) {
                        statusClass = 'status-pending';
                        statusText = '持仓中';
                        pendingCount++;
                    }
                    
                    const now = Math.floor(Date.now() / 1000);
                    const remainingTime = endTime > now ? endTime - now : 0;
                    
                    childrenHtml += `
                        <div class="child-item">
                            <div class="child-header">
                                <span class="child-address">${child}</span>
                                <span class="child-status ${statusClass}">${statusText}</span>
                            </div>
                            <div class="child-details">
                                <div class="detail-item">
                                    <div class="detail-label">当前持仓</div>
                                    <div class="detail-value">${formatTokenAmount(balance)}</div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label">目标门槛</div>
                                    <div class="detail-value">${threshold > 0 ? formatTokenAmount(threshold) : '-'}</div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label">时间状态</div>
                                    <div class="detail-value">${remainingTime > 0 ? formatTimeLeft(remainingTime) : (qualified ? '✅' : '❌')}</div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label">操作</div>
                                    <div class="detail-value">
                                        <button class="claim-btn-small" 
                                            onclick="claimSingleReward('${child}')" 
                                            ${canClaim ? '' : 'disabled'}>
                                            ${isClaimed ? '已领取' : '领取'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }
                
                document.getElementById('childrenList').innerHTML = childrenHtml;
                document.getElementById('qualifiedChildren').textContent = qualifiedCount;
                document.getElementById('pendingChildren').textContent = pendingCount;
                
            } catch (error) {
                console.error('加载下级失败:', error);
            }
        }
        
        // ==================== 领取单个下级奖励 ====================
        async function claimSingleReward(childAddress) {
            const btn = event.target;
            
            try {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading"></span>';
                
                await contract.methods.claimReward(childAddress).send({
                    from: account,
                    gas: 200000
                });
                
                showMessage('🎉 领取成功！');
                await loadChildren();
                
            } catch (error) {
                console.error('领取失败:', error);
                if (error.message.includes('User rejected')) {
                    showMessage('您取消了交易', 'error');
                } else {
                    showMessage('领取失败', 'error');
                }
                btn.innerHTML = '领取';
                btn.disabled = false;
            }
        }
        
        // ==================== 上级资格状态 ====================
        async function loadUpQualifyStatus() {
            try {
                const qualifyList = document.getElementById('qualifyList');
                
                const myReferrer = await contract.methods.referrer(account).call();
                const hasReferrer = myReferrer && myReferrer !== '0x0000000000000000000000000000000000000000';
                const balance = await contract.methods.balanceOf(account).call();
                const balanceNum = parseFloat(balance) / Math.pow(10, CONFIG.DECIMALS);
                
                const currentPhase = await contract.methods.getRewardPhase().call();
                
                let threshold = 100000;
                let rewardPercent = 1;
                if (currentPhase == 2) {
                    threshold = 300000;
                    rewardPercent = 3;
                } else if (currentPhase == 3) {
                    threshold = 100000;
                    rewardPercent = 5;
                }
                
                const qualified = balanceNum >= threshold;
                
                qualifyList.innerHTML = `
                    <div class="qualify-item">
                        <span class="qualify-label">1. 绑定上级</span>
                        <span class="qualify-status" style="color: ${hasReferrer ? '#4caf50' : '#f44336'}">
                            ${hasReferrer ? '✅ 已绑定' : '❌ 未绑定'}
                        </span>
                    </div>
                    <div class="qualify-item">
                        <span class="qualify-label">2. 当前持仓 ≥ ${formatTokenAmount((threshold * 1e18).toString())}</span>
                        <span class="qualify-status" style="color: ${qualified ? '#4caf50' : '#f44336'}">
                            ${qualified ? '✅ 已达标' : '❌ 未达标 (' + formatTokenAmount(balance) + ')'}
                        </span>
                    </div>
                    <div class="qualify-item">
                        <span class="qualify-label">3. 当前阶段奖励比例</span>
                        <span class="qualify-status" style="color: #f093fb">
                            第${currentPhase}阶段 - ${rewardPercent}%
                        </span>
                    </div>
                    <div class="qualify-item">
                        <span class="qualify-label">💡 提示</span>
                        <span class="qualify-status" style="color: #8892b0; font-size: 12px;">
                            必须先绑定上级才能推广下级
                        </span>
                    </div>
                `;
                
            } catch (error) {
                console.error('加载资格状态失败:', error);
            }
        }
        
        // ==================== 复制推广链接 ====================
        function copyReferralLink() {
            const input = document.getElementById('referralLink');
            input.select();
            document.execCommand('copy');
            showMessage('推广链接已复制！');
        }
        
        // ==================== 监听钱包切换 ====================
        if (window.ethereum) {
            window.ethereum.on('accountsChanged', (accounts) => {
                if (accounts.length === 0) {
                    location.reload();
                } else if (accounts[0] !== account) {
                    location.reload();
                }
            });
        }
        
        // ==================== 页面加载 ====================
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof window.ethereum !== 'undefined') {
                window.ethereum.request({ method: 'eth_accounts' }).then(accounts => {
                    if (accounts.length > 0) {
                        connectWallet();
                    }
                });
            }
        });
    </script>
</body>
</html>
